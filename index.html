<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milestone Countdown</title>
    
    <link rel="icon" href="assets/Countdown Logo.ico" type="image/x-icon">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #050505;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% 0%, #1a1a1a 0%, #050505 70%);
        }

        .countdown-container {
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 40px;
            width: 90%;
            max-width: 550px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
        }

        .header-title {
            text-align: center;
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 4px;
            margin-bottom: 35px;
            color: #ffffff;
            text-transform: uppercase;
        }

        .event-item {
            margin-bottom: 25px;
            padding-bottom: 25px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .event-item:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .event-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .event-name {
            font-size: 1.1rem;
            font-weight: 500;
            color: #ffffff;
            letter-spacing: 1px;
        }

        .target-date {
            font-size: 0.8rem;
            color: #666;
            font-family: monospace;
        }

        .time-display {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .time-box {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 12px 5px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .time-box:hover {
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
            background: rgba(25, 25, 25, 0.8);
        }

        .time-value {
            font-size: 1.4rem;
            font-weight: 600;
            color: #ffffff;
            font-family: monospace;
            margin-bottom: 4px;
        }

        .time-label {
            font-size: 0.65rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }
        
        .completed {
            color: #555;
            font-style: italic;
            font-size: 0.9rem;
            text-align: center;
            padding: 15px 0;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            border: 1px dashed rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>

    <div class="countdown-container">
        <h1 class="header-title">Countdown</h1>
        <div id="events-wrapper">
            </div>
    </div>

    <script src="countdown.js"></script>
</body>
</html>
